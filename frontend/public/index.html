        <!-- PWA Install Prompt -->
        <div id="pwa-install-prompt">
          <div class="pwa-content">
            <img src="/logo-lottolab.png" alt="LOTTOLAB" />
            <div class="pwa-text">
              <h3>Installer LOTTOLAB</h3>
              <p>Accédez rapidement depuis votre écran d'accueil</p>
            </div>
          </div>
          <div class="pwa-buttons">
            <button class="pwa-dismiss-btn" onclick="dismissPwaPrompt()">Plus tard</button>
            <button class="pwa-install-btn" onclick="installPwa()">Installer</button>
          </div>

        <!-- PWA Service Worker Registration -->
        <script>
          let deferredPrompt;
          const pwaPrompt = document.getElementById('pwa-install-prompt');
          
          // Check if already installed or dismissed recently
          function shouldShowPrompt() {
            if (window.matchMedia('(display-mode: standalone)').matches) return false;
            const dismissed = localStorage.getItem('pwa-dismissed');
            if (dismissed) {
              const dismissedTime = parseInt(dismissed, 10);
              if (Date.now() - dismissedTime < 7 * 24 * 60 * 60 * 1000) return false; // 7 days
            }
            return true;
          }
          
          // Show install prompt
          window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (shouldShowPrompt()) {
              setTimeout(() => {
                pwaPrompt.style.display = 'block';
              }, 3000); // Show after 3 seconds
            }
          });
          
          // Install PWA
          function installPwa() {
            pwaPrompt.style.display = 'none';
            if (deferredPrompt) {
              deferredPrompt.prompt();
              deferredPrompt.userChoice.then((result) => {
                console.log('[PWA] Install result:', result.outcome);
                deferredPrompt = null;
              });
            }
          }
          
          // Dismiss prompt
          function dismissPwaPrompt() {
            pwaPrompt.style.display = 'none';
            localStorage.setItem('pwa-dismissed', Date.now().toString());
          }
          
          // Register service worker
          if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
              navigator.serviceWorker.register('/service-worker.js')
                .then((registration) => {
                  console.log('[SW] Registered:', registration.scope);
                })
                .catch((error) => {
                  console.log('[SW] Registration failed:', error);
                });
            });
          }
        </script>
