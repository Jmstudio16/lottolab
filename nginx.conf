# LOTTOLAB Nginx Production Configuration
# Save to: /etc/nginx/sites-available/lottolab

# Upstream for backend load balancing (if needed)
upstream lottolab_backend {
    server 127.0.0.1:8001;
    keepalive 32;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=lottolab_limit:10m rate=10r/s;

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name lottolab.com www.lottolab.com api.lottolab.com;
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name lottolab.com www.lottolab.com;
    
    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/lottolab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lottolab.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Frontend static files
    root /var/www/lottolab/frontend/build;
    index index.html;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    
    # Frontend routes (SPA)
    location / {
        try_files $uri $uri/ /index.html;
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
    
    # Static assets
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # API proxy to backend
    location /api {
        limit_req zone=lottolab_limit burst=20 nodelay;
        
        proxy_pass http://lottolab_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
    
    # Health check endpoint
    location /health {
        proxy_pass http://lottolab_backend/api/health;
        access_log off;
    }
    
    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /var/www/lottolab/frontend/build;
    }
}

# API-only subdomain (optional)
server {
    listen 443 ssl http2;
    server_name api.lottolab.com;
    
    ssl_certificate /etc/letsencrypt/live/lottolab.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lottolab.com/privkey.pem;
    
    location / {
        limit_req zone=lottolab_limit burst=20 nodelay;
        
        proxy_pass http://lottolab_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
