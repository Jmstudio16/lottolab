# Render.com configuration
services:
  - type: web
    name: lottolab-api
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: lottolab
      - key: JWT_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://lottolab.tech,https://www.lottolab.tech
