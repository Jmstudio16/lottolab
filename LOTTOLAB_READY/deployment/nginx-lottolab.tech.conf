# LOTTOLAB Frontend - Nginx Configuration
# Fichier: /etc/nginx/sites-available/lottolab.tech

server {
    listen 80;
    server_name lottolab.tech www.lottolab.tech;

    root /var/www/lottolab-frontend;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Static files caching
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React Router - SPA support
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}

# Note: Après installation, lancez:
# sudo certbot --nginx -d lottolab.tech -d www.lottolab.tech
# pour ajouter HTTPS automatiquement
