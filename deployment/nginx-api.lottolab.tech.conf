# Configuration Nginx pour api.lottolab.tech
# Fichier: /etc/nginx/sites-available/api.lottolab.tech

server {
    listen 80;
    server_name api.lottolab.tech;

    # Redirection HTTP vers HTTPS (sera activé par certbot)
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.lottolab.tech;

    # Les certificats SSL seront ajoutés par certbot
    # ssl_certificate /etc/letsencrypt/live/api.lottolab.tech/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.lottolab.tech/privkey.pem;

    # Configuration SSL moderne
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Logs
    access_log /var/log/nginx/api.lottolab.tech.access.log;
    error_log /var/log/nginx/api.lottolab.tech.error.log;

    # Proxy vers le backend FastAPI
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        
        # Headers importants
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering off;
        proxy_buffer_size 4k;
    }

    # Health check endpoint (pas de cache)
    location /api/health {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
