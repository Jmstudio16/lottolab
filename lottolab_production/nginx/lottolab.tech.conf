# LOTTOLAB Frontend - Nginx Configuration
# lottolab.tech -> Frontend React (static files)

server {
    listen 80;
    server_name lottolab.tech www.lottolab.tech;

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name lottolab.tech www.lottolab.tech;

    # SSL certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/lottolab.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lottolab.tech/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Document root
    root /var/www/lottolab-frontend;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Static files caching
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React Router - SPA support
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
